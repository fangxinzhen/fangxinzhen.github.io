name: Deploy Hugo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Debug - Check files
        run: |
          echo "=== Current directory ==="
          ls -la
          echo "=== Themes ==="
          ls -la themes/ || echo "NO themes dir"
          echo "=== Git submodules ==="
          cat .gitmodules

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Build
        run: hugo --minify --gc

      - name: Debug - Check build
        run: |
          echo "=== public/ contents ==="
          ls -la public/
          test -f public/index.html && echo "✅ index.html exists" || echo "❌ index.html missing!"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
