baseURL: "https://fangxinzhen.github.io/"
locale: "zh-CN"
defaultContentLanguage: "zh-cn"
hasCJKLanguage: true
title: "个人技术博客"
theme: "hugo-theme-stack"

languages:
  zh-cn:
    label: "简体中文"
    weight: 1
    contentDir: "content/zh-cn"
    menu:
      main:
        - name: "首页"
          url: "/"
          weight: 1
        - name: "关于"
          url: "/about/"
          weight: 2
        - name: "归档"
          url: "/archives/"
          weight: 3
        - name: "分类"
          url: "/categories/"
          weight: 4
        - name: "标签"
          url: "/tags/"
          weight: 5
        - name: "搜索"
          url: "/search/"
          weight: 6
        - name: "友链"
          url: "/links/"
          weight: 7

  en:
    label: "English"
    weight: 2
    contentDir: "content/en"
    menu:
      main:
        - name: "Home"
          url: "/"
          weight: 1
        - name: "About"
          url: "/about/"
          weight: 2
        - name: "Archives"
          url: "/archives/"
          weight: 3
        - name: "Categories"
          url: "/categories/"
          weight: 4
        - name: "Tags"
          url: "/tags/"
          weight: 5
        - name: "Search"
          url: "/search/"
          weight: 6
        - name: "Links"
          url: "/links/"
          weight: 7

params:
  sidebar:
    emoji: "📚"
    subtitle: "记录技术成长 | 分享学习心得"
    avatar: ""

  colorScheme:
    default: auto
    toggle: true

  dateFormat:
    published: "2006-01-02"

  widgets:
    homepage:
      - type: archives
      - type: categories
      - type: tag-cloud
      - type: recent-posts
    page:
      - type: toc

  enableArticleTOC: true
  enableCodeCopy: true
  enableLightbox: true
  enableGallery: true
  enableReadingTime: true
  enableWordCount: true

  footer:
    enable: true
    copyright: "Copyright © 2025-2026 All Rights Reserved"
    author: "Fangxz"
